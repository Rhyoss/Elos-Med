# ── Headers de segurança aplicados em todas as rotas ─────────────────────────
add_header X-Frame-Options            "DENY"                     always;
add_header X-Content-Type-Options     "nosniff"                  always;
add_header X-XSS-Protection           "1; mode=block"            always;
add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'none';" always;

# ── MinIO / Object Storage ────────────────────────────────────────────────────
location /storage/ {
  proxy_pass         http://storage_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_buffering    off;
  proxy_read_timeout 300s;
  client_max_body_size 100M;
}

# ── AI Service ────────────────────────────────────────────────────────────────
location /ai/ {
  limit_req zone=api burst=20 nodelay;

  proxy_pass         http://ai_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
}

# ── API (tRPC + REST) ─────────────────────────────────────────────────────────
location /api/ {
  limit_req zone=api burst=50 nodelay;

  proxy_pass         http://api_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;
}

# ── Auth endpoints (rate limit mais restritivo) ───────────────────────────────
# SEC-09: o path real do tRPC é /api/trpc/auth.X — o location anterior
# (/api/auth/login) nunca casava. Defesa em camadas: nginx (5r/m por IP)
# + Fastify hook em apps/api/src/index.ts (segundo gate por IP via Redis).
location ~* ^/api/trpc/auth\.(login|forgotPassword|resetPassword|refresh) {
  limit_req zone=auth burst=5 nodelay;

  proxy_pass         http://api_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
}

# ── WebSocket ─────────────────────────────────────────────────────────────────
location /ws {
  proxy_pass         http://api_upstream/ws;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection "upgrade";
  proxy_set_header   Host       $host;
  proxy_read_timeout 86400s;
}

# ── Frontend Next.js ──────────────────────────────────────────────────────────
location / {
  proxy_pass         http://web_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;

  # Next.js HMR em dev
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_cache_bypass $http_upgrade;
}
