user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # ── Gzip ─────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # ── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  upstream api_upstream {
    server api:3001;
    keepalive 32;
  }

  upstream ai_upstream {
    server ai:8000;
    keepalive 8;
  }

  upstream storage_upstream {
    server storage:9000;
    keepalive 16;
  }

  # ── Headers de segurança comuns ───────────────────────────────────────────
  map $sent_http_content_type $cache_control {
    ~*text/html                     "no-store";
    ~*application/json              "no-store";
    ~*image/                        "public, max-age=31536000, immutable";
    ~*font/                         "public, max-age=31536000, immutable";
    ~*application/javascript        "public, max-age=31536000, immutable";
    ~*text/css                      "public, max-age=31536000, immutable";
    default                         "no-cache";
  }

  # ── Servidor HTTP ───────────────────────────────────────────────────────
  # SEC-20: redirecionamento HTTP→HTTPS ativado por padrão para todos os
  # paths exceto health check e ACME challenge.
  server {
    listen 80 default_server;
    server_name _;

    # Health check do Nginx
    location /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ACME challenge — não redirecionar (Let's Encrypt http-01)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # SEC-20: em produção (NGINX_REDIRECT_HTTPS=true) redirect 301 → HTTPS.
    # Em dev (sem TLS), serve direto. Para alternar, descomente:
    # return 301 https://$host$request_uri;

    include /etc/nginx/conf.d/locations.conf;
  }

  # ── Servidor HTTPS (SEC-20) ──────────────────────────────────────────────
  # Para ativar:
  #   1. Coloque cert.pem / key.pem em ./nginx/ssl/
  #   2. Descomente o bloco abaixo
  #   3. Descomente o redirect 301 no bloco HTTP acima
  # Em GCP, alternativa preferida é Cloud LB com managed certificate; o
  # backend recebe HTTP da infra do Google e este bloco fica desativado.
  #
  # server {
  #   listen 443 ssl http2;
  #   http2 on;
  #   server_name app.dermaos.com.br portal.dermaos.com.br;
  #
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_session_timeout 1d;
  #   ssl_session_cache shared:SSL:50m;
  #   ssl_session_tickets off;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #
  #   # SEC-20: HSTS preload-ready (2 anos + includeSubDomains + preload).
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  #
  #   include /etc/nginx/conf.d/locations.conf;
  # }
}
