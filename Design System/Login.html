<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElosMed — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #174D38;
  --primary-light: #246652;
  --primary-dark: #0E3325;
  --accent: #4D1717;
  --bg: #F2F2F2;
  --border: #CBCBCB;
  --glass: rgba(255,255,255,0.62);
  --glass-border: rgba(200,200,200,0.80);
  --text-primary: #2B2B2B;
  --text-secondary: #5F5F5F;
  --text-muted: #8E8E8E;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: linear-gradient(155deg, #F6F6F6 0%, #EDEDED 100%);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Interactive Background */
.bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.08;
  transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
}

.orb-1 {
  width: 600px;
  height: 600px;
  background: var(--primary);
  top: -200px;
  left: -200px;
}

.orb-2 {
  width: 500px;
  height: 500px;
  background: var(--accent);
  bottom: -150px;
  right: -150px;
}

.orb-3 {
  width: 400px;
  height: 400px;
  background: var(--primary-light);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Login Container */
.login-container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 20px;
}

.login-card {
  background: rgba(250, 249, 247, 0.78);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 0.5px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.5) inset,
              0 12px 40px rgba(0, 0, 0, 0.12),
              0 2px 8px rgba(23, 77, 56, 0.04);
  padding: 48px 40px;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, 
    transparent 0%, 
    rgba(255, 255, 255, 0.6) 50%, 
    transparent 100%);
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.logo p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* Form */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  font-size: 14px;
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--text-primary);
  transition: all 0.2s ease;
  outline: none;
}

.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(23, 77, 56, 0.10);
  background: rgba(255, 255, 255, 0.8);
}

.form-input::placeholder {
  color: var(--text-muted);
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  font-size: 12px;
}

.checkbox-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}

.checkbox-wrapper input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--primary);
}

.checkbox-wrapper label {
  color: var(--text-secondary);
  cursor: pointer;
}

.forgot-link {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}

.forgot-link:hover {
  color: var(--primary-light);
}

/* Button */
.btn-primary {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 14px rgba(23, 77, 56, 0.20);
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.btn-primary:hover::before {
  left: 100%;
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(23, 77, 56, 0.25);
}

.btn-primary:active {
  transform: translateY(0);
}

/* Divider */
.divider {
  margin: 28px 0;
  text-align: center;
  position: relative;
}

.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--border);
  opacity: 0.4;
}

.divider span {
  position: relative;
  display: inline-block;
  padding: 0 16px;
  background: rgba(250, 249, 247, 0.78);
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.8px;
}

/* Secondary Button */
.btn-secondary {
  width: 100%;
  padding: 14px;
  background: rgba(23, 77, 56, 0.06);
  color: var(--primary);
  border: 1px solid rgba(23, 77, 56, 0.18);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'IBM Plex Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-secondary:hover {
  background: rgba(23, 77, 56, 0.10);
  border-color: rgba(23, 77, 56, 0.28);
}

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text-muted);
}

.login-footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}

.login-footer a:hover {
  text-decoration: underline;
}

/* Metal accent */
.metal-line {
  height: 2px;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    rgba(255, 255, 255, 0.022) 1px,
    transparent 2px,
    transparent 8px
  );
  margin: 32px 0 24px;
  opacity: 0.6;
}

/* Floating particles */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--primary);
  border-radius: 50%;
  opacity: 0;
  animation: float 8s infinite ease-in-out;
}

@keyframes float {
  0%, 100% {
    opacity: 0;
    transform: translateY(0) translateX(0);
  }
  10% {
    opacity: 0.3;
  }
  50% {
    opacity: 0.15;
    transform: translateY(-100px) translateX(50px);
  }
  90% {
    opacity: 0.3;
  }
}

.particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { top: 40%; left: 80%; animation-delay: 2s; }
.particle:nth-child(3) { top: 60%; left: 30%; animation-delay: 4s; }
.particle:nth-child(4) { top: 80%; left: 70%; animation-delay: 6s; }
.particle:nth-child(5) { top: 30%; left: 50%; animation-delay: 1s; }
</style>
</head>
<body>
  <!-- Interactive Background -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>ElosMed</h1>
        <p>Plataforma Médica Integrada</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="seu@email.com.br"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••"
            required
          >
        </div>

        <div class="form-options">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="remember">
            <label for="remember">Lembrar de mim</label>
          </div>
          <a href="#" class="forgot-link">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn-primary">
          Entrar
        </button>
      </form>

      <div class="divider">
        <span>OU</span>
      </div>

      <button type="button" class="btn-secondary">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332A8.997 8.997 0 009.003 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.003 0A8.997 8.997 0 00.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
        </svg>
        Continuar com Google
      </button>

      <div class="metal-line"></div>

      <div class="login-footer">
        Não tem uma conta? <a href="#">Criar conta</a>
      </div>
    </div>
  </div>

  <script>
    // Interactive background following mouse
    const orbs = document.querySelectorAll('.orb');
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateOrbs() {
      orbs.forEach((orb, index) => {
        const speed = (index + 1) * 0.02;
        const x = (mouseX - window.innerWidth / 2) * speed;
        const y = (mouseY - window.innerHeight / 2) * speed;
        
        orb.style.transform = `translate(${x}px, ${y}px)`;
      });
      
      requestAnimationFrame(animateOrbs);
    }

    animateOrbs();

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      console.log('Login attempt:', { email, password });
      
      // Add loading state
      const btn = e.target.querySelector('.btn-primary');
      const originalText = btn.textContent;
      btn.textContent = 'Entrando...';
      btn.disabled = true;
      
      // Simulate authentication
      setTimeout(() => {
        btn.textContent = originalText;
        btn.disabled = false;
        alert('Login simulado com sucesso!');
      }, 1500);
    });

    // Persist form state
    const emailInput = document.getElementById('email');
    const rememberCheckbox = document.getElementById('remember');
    
    // Load saved email
    const savedEmail = localStorage.getItem('elosmed_saved_email');
    if (savedEmail) {
      emailInput.value = savedEmail;
      rememberCheckbox.checked = true;
    }
    
    // Save email on remember
    rememberCheckbox.addEventListener('change', (e) => {
      if (e.target.checked && emailInput.value) {
        localStorage.setItem('elosmed_saved_email', emailInput.value);
      } else {
        localStorage.removeItem('elosmed_saved_email');
      }
    });
    
    emailInput.addEventListener('blur', () => {
      if (rememberCheckbox.checked && emailInput.value) {
        localStorage.setItem('elosmed_saved_email', emailInput.value);
      }
    });
  </script>
</body>
</html>
