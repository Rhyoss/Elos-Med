# ─────────────────────────────────────────────────────────────────────────────
# DermaOS — Headers de segurança aplicados a todas as respostas
# Prompt 20: HSTS, CSP nonce, X-Frame-Options, Referrer-Policy, etc.
# ─────────────────────────────────────────────────────────────────────────────

# HSTS — preload + includeSubDomains. Mantido também em HTTP (browsers ignoram em HTTP,
# mas reverse proxies em frente podem propagar). Em HTTPS é mandatório.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# CSP — nonce por request. unsafe-inline removido. Default = 'self'.
# style-src mantém 'unsafe-inline' temporariamente até CSS-in-JS expor nonce; report-only.
add_header Content-Security-Policy
  "default-src 'self'; \
   script-src 'self' 'nonce-$csp_nonce'; \
   style-src 'self' 'unsafe-inline'; \
   img-src 'self' data: blob: https:; \
   font-src 'self' data:; \
   connect-src 'self' wss:; \
   frame-ancestors 'none'; \
   base-uri 'self'; \
   form-action 'self'; \
   object-src 'none'; \
   manifest-src 'self'"
  always;

# Reportar violações em staging antes de aplicar em prod (descomentar):
# add_header Content-Security-Policy-Report-Only "default-src 'self'; report-uri /csp-report" always;

add_header X-Frame-Options            "DENY"                              always;
add_header X-Content-Type-Options     "nosniff"                           always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
add_header Permissions-Policy         "camera=(self), microphone=(), geolocation=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin"                       always;
add_header Cross-Origin-Resource-Policy "same-origin"                     always;
add_header Cache-Control              $cache_control                      always;

# Esconder infraestrutura — versão do Nginx é gerenciada via server_tokens off.
# X-Powered-By do Next/Fastify deve ser removido na app; aqui apenas reforço:
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# Header customizado expondo nonce ao backend (para SSR injetar em <script nonce="...">)
proxy_set_header X-CSP-Nonce $csp_nonce;
proxy_set_header X-Request-ID $request_id;

# ─── MinIO / Object Storage ──────────────────────────────────────────────────
location /storage/ {
  proxy_pass         http://storage_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_buffering    off;
  proxy_read_timeout 300s;
  client_max_body_size 100M;
}

# ─── AI Service ──────────────────────────────────────────────────────────────
location /ai/ {
  limit_req zone=api burst=50 nodelay;

  proxy_pass         http://ai_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
}

# ─── Login (rate limit agressivo: 5/min por IP) ─────────────────────────────
location = /api/auth/login {
  limit_req zone=auth burst=2 nodelay;

  proxy_pass         http://api_upstream/api/auth/login;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
}

# ─── Uploads (10 req/min por IP — app aplica limite por usuário) ────────────
location ~ ^/api/.*/upload {
  limit_req zone=upload burst=5 nodelay;
  client_max_body_size 50M;

  proxy_pass         http://api_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
}

# ─── LGPD export (2 req/h por IP — app aplica limite por usuário) ────────────
location = /api/lgpd/export {
  limit_req zone=lgpd burst=1 nodelay;

  proxy_pass         http://api_upstream/api/lgpd/export;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
}

# ─── Webhooks omni — burst alto ──────────────────────────────────────────────
location ~ ^/api/webhooks/ {
  limit_req zone=webhook burst=100 nodelay;

  proxy_pass         http://api_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
}

# ─── API (tRPC + REST genérico) ──────────────────────────────────────────────
location /api/ {
  limit_req zone=api burst=200 nodelay;

  proxy_pass         http://api_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;
}

# ─── Portal do Paciente ──────────────────────────────────────────────────────
location = /portal/auth/login {
  limit_req zone=auth burst=2 nodelay;

  proxy_pass         http://api_upstream/portal/auth/login;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
}

location /portal/ {
  limit_req zone=api burst=100 nodelay;

  proxy_pass         http://api_upstream/portal/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;
}

location /paciente/ {
  # PWA: precisa permitir Service Worker e manifest
  add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'self' 'nonce-$csp_nonce'; \
     style-src 'self' 'unsafe-inline'; \
     img-src 'self' data: blob: https:; \
     font-src 'self' data:; \
     connect-src 'self' wss:; \
     frame-ancestors 'none'; \
     manifest-src 'self'; \
     worker-src 'self'; \
     base-uri 'self'"
    always;

  proxy_pass         http://portal_upstream/;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Request-ID      $request_id;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;

  proxy_set_header   Upgrade    $http_upgrade;
  proxy_cache_bypass $http_upgrade;
}

# ─── WebSocket ───────────────────────────────────────────────────────────────
location /ws {
  proxy_pass         http://api_upstream/ws;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection "upgrade";
  proxy_set_header   Host       $host;
  proxy_read_timeout 86400s;
}

# ─── Frontend Next.js ────────────────────────────────────────────────────────
location / {
  proxy_pass         http://web_upstream;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-CSP-Nonce       $csp_nonce;
  proxy_set_header   X-Request-ID      $request_id;
  proxy_http_version 1.1;
  proxy_set_header   Connection        "";
  proxy_read_timeout 30s;

  # Next.js HMR em dev
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_cache_bypass $http_upgrade;
}
