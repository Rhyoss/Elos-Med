user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # ── Esconder identificação de servidor ────────────────────────────────────
  # server_tokens remove versão de Nginx em respostas de erro. Para zerar o
  # header "Server" totalmente é preciso ngx_headers_more; ver locations.conf
  # (proxy_hide_header) onde o header de upstream também é removido.
  server_tokens off;

  # ── Gzip ─────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # ── Rate limiting (camada IP — Prompt 20) ─────────────────────────────────
  # Por IP genérico: 100 req/s. Endpoints sensíveis sobrepõem com zonas dedicadas.
  limit_req_zone $binary_remote_addr zone=api:10m       rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m      rate=5r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=lgpd:10m      rate=2r/h;
  limit_req_zone $binary_remote_addr zone=webhook:10m   rate=500r/m;
  limit_req_status 429;

  # ── CSP nonce — gerado por request via Lua/njs (placeholder) ──────────────
  # Em produção, instalar njs e injetar nonce dinâmico. Aqui usamos $request_id
  # como nonce — opaco, único por request, suficiente para hardening básico.
  map $request_id $csp_nonce { default $request_id; }

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream web_upstream     { server web:3000;     keepalive 32; }
  upstream api_upstream     { server api:3001;     keepalive 32; }
  upstream ai_upstream      { server ai:8000;      keepalive 8;  }
  upstream storage_upstream { server storage:9000; keepalive 16; }
  upstream portal_upstream  { server portal:3002;  keepalive 16; }

  # ── Cache-Control para conteúdo de pacientes (PHI) ────────────────────────
  # JSON e HTML: no-store. Estáticos (img/css/font/js): immutable.
  map $sent_http_content_type $cache_control {
    ~*text/html                     "no-store";
    ~*application/json              "no-store, no-cache, must-revalidate, private";
    ~*image/                        "public, max-age=31536000, immutable";
    ~*font/                         "public, max-age=31536000, immutable";
    ~*application/javascript        "public, max-age=31536000, immutable";
    ~*text/css                      "public, max-age=31536000, immutable";
    default                         "no-cache";
  }

  # ── HTTP → HTTPS (em produção) ────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    location /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Em produção (NODE_ENV=production), descomentar:
    # if ($http_x_forwarded_proto != "https") {
    #   return 301 https://$host$request_uri;
    # }

    include /etc/nginx/conf.d/locations.conf;
  }

  # ── Servidor HTTPS ────────────────────────────────────────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
  #
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_session_timeout 1d;
  #   ssl_session_cache shared:SSL:50m;
  #   ssl_session_tickets off;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #
  #   # HSTS com preload — só em HTTPS efetivo
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  #
  #   include /etc/nginx/conf.d/locations.conf;
  # }
}
