name: dermaos

services:
  # ─── PostgreSQL 16 + pgvector ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: dermaos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dermaos}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dermaos_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=64MB
        -c effective_cache_size=1536MB
        -c max_parallel_workers_per_gather=4
        -c max_connections=200
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-dermaos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dermaos-internal

  # ─── Redis 7 ───────────────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: dermaos-cache
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dermaos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dermaos-internal

  # ─── MinIO (S3-compatible object storage) ──────────────────────────────────
  storage:
    image: minio/minio:latest
    container_name: dermaos-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - dermaos_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dermaos-internal

  # Cria buckets MinIO no primeiro boot
  storage-init:
    image: minio/mc:latest
    container_name: dermaos-storage-init
    depends_on:
      storage:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: http://storage:9000
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://storage:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/clinical-images;
        mc mb --ignore-existing local/documents;
        mc mb --ignore-existing local/exports;
        mc mb --ignore-existing local/avatars;
        mc anonymous set download local/avatars;
        echo 'MinIO buckets ready.';
        exit 0;
      "
    networks:
      - dermaos-internal
    restart: "no"

  # ─── Typesense 27 ──────────────────────────────────────────────────────────
  search:
    image: typesense/typesense:27.1
    container_name: dermaos-search
    restart: unless-stopped
    command: >
      --data-dir=/data
      --api-key=${TYPESENSE_API_KEY}
      --listen-port=8108
      --enable-cors
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - dermaos_typesense_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dermaos-internal

  # ─── Ollama (IA local — dados clínicos PHI) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: dermaos-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - dermaos_ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
    # GPU reservation opcional — funciona sem GPU (CPU fallback)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - dermaos-internal

  # ─── API Backend (Fastify + tRPC) ──────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runner
    container_name: dermaos-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dermaos}
      REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
      MINIO_ENDPOINT: storage
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TYPESENSE_HOST: search
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      MASTER_KEY_VERSION: ${MASTER_KEY_VERSION:-1}
      TENANT_HMAC_SECRET: ${TENANT_HMAC_SECRET}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET}
      PORTAL_URL: ${PORTAL_URL:-http://localhost:3002}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      - dermaos-internal
      - dermaos-public

  # ─── Web Frontend (Next.js 15) ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: runner
    container_name: dermaos-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      NEXT_PUBLIC_STORAGE_URL: ${NEXT_PUBLIC_STORAGE_URL:-http://localhost/storage}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - dermaos-internal
      - dermaos-public

  # ─── Portal do Paciente (Next.js 15 PWA mobile-first) ────────────────────────
  portal:
    build:
      context: .
      dockerfile: apps/patient-portal/Dockerfile
      target: runner
    container_name: dermaos-portal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_PORTAL_URL: ${PORTAL_URL:-http://localhost/paciente}
      NEXT_PUBLIC_CAPTCHA_SITE_KEY: ${NEXT_PUBLIC_CAPTCHA_SITE_KEY}
    ports:
      - "${PORTAL_PORT:-3002}:3002"
    networks:
      - dermaos-internal
      - dermaos-public

  # ─── Worker (BullMQ background jobs) ──────────────────────────────────────
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
      target: runner
    container_name: dermaos-worker
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dermaos}
      REDIS_URL: redis://:${REDIS_PASSWORD}@cache:6379
      MINIO_ENDPOINT: storage
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      MASTER_KEY_VERSION: ${MASTER_KEY_VERSION:-1}
      TENANT_HMAC_SECRET: ${TENANT_HMAC_SECRET}
    networks:
      - dermaos-internal

  # ─── AI Service (Python FastAPI + Ollama) ──────────────────────────────────
  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: dermaos-ai
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dermaos}
      OLLAMA_BASE_URL: http://ollama:11434
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${AI_PORT:-8000}:8000"
    networks:
      - dermaos-internal
      - dermaos-public

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: dermaos-proxy
    restart: unless-stopped
    depends_on:
      - web
      - api
      - ai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - dermaos-public
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  dermaos-internal:
    driver: bridge
    internal: true
  dermaos-public:
    driver: bridge

volumes:
  dermaos_pg_data:
    driver: local
  dermaos_redis_data:
    driver: local
  dermaos_minio_data:
    driver: local
  dermaos_typesense_data:
    driver: local
  dermaos_ollama_models:
    driver: local
