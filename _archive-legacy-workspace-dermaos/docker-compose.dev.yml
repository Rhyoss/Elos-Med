name: dermaos

# Override para desenvolvimento local (hot reload, ferramentas de debug)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

# Em dev, a rede interna NÃO é internal para permitir port-forwarding ao host
networks:
  dermaos-internal:
    driver: bridge
    internal: false

services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # pgAdmin só sobe em dev
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dermaos-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@dermaos.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - dermaos_pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dermaos-internal
      - dermaos-public

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
      target: development
    environment:
      NODE_ENV: development
      DEBUG: "dermaos:*"
      LOG_LEVEL: debug
    volumes:
      - ./apps/api/src:/app/apps/api/src:cached
      - ./packages/shared/src:/app/packages/shared/src:cached
      - api_node_modules:/app/node_modules
    command: pnpm dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
      target: development
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_STORAGE_URL: http://localhost:9000
      # Proxy server-side (Next rewrites) — usa DNS interno do Docker
      API_INTERNAL_URL: http://api:3001
    volumes:
      - ./apps/web/src:/app/apps/web/src:cached
      - ./packages/shared/src:/app/packages/shared/src:cached
      - ./packages/ui/src:/app/packages/ui/src:cached
      - web_node_modules:/app/node_modules
    command: pnpm dev

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.dev
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./apps/worker/src:/app/apps/worker/src:cached
      - ./packages/shared/src:/app/packages/shared/src:cached
      - worker_node_modules:/app/node_modules
    command: pnpm dev

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    environment:
      DEBUG: "true"
      LOG_LEVEL: debug
    volumes:
      - ./apps/ai/src:/app/src:cached

  # Em dev, sem proxy — acesso direto às portas
  proxy:
    profiles: ["prod-only"]

volumes:
  dermaos_pgadmin_data:
    driver: local
  api_node_modules:
    driver: local
  web_node_modules:
    driver: local
  worker_node_modules:
    driver: local
